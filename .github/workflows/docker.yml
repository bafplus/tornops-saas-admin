name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24
    permissions:
      contents: read
      packages: write
      id-token: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/bafplus/tornops-saas-admin:latest,ghcr.io/bafplus/tornops-saas-admin:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/bafplus/tornops-saas-admin:buildcache
          cache-to: type=registry,ref=ghcr.io/bafplus/tornops-saas-admin:buildcache,mode=max